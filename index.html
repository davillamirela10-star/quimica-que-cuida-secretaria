<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Química que Cuida - Jogo de Trilha</title>
  <link rel="preconnect" href="https://www.gstatic.com">
  <link rel="preconnect" href="https://api.qrserver.com">
  <style>
    :root{
      --roxo:#6d28d9;--roxo2:#a855f7;--rosa:#ec4899;--rosa2:#f9a8d4;--branco:#fff;--verde:#22c55e;--azul:#38bdf8;--amarelo:#facc15;--preto:#1e1433;--cinza:#f8f5ff;
    }
    *{box-sizing:border-box}body{margin:0;font-family:Inter,Arial,sans-serif;background:radial-gradient(circle at top left,#ffe4f3 0,#f7eeff 35%,#eefcff 100%);color:var(--preto);min-height:100vh}.hidden{display:none!important}
    .app{min-height:100vh;padding:22px}.top{display:flex;justify-content:space-between;gap:16px;align-items:center;margin-bottom:18px}.brand{display:flex;gap:12px;align-items:center}.logo{width:58px;height:58px;border-radius:20px;background:linear-gradient(135deg,var(--roxo),var(--rosa));display:grid;place-items:center;color:white;font-size:28px;box-shadow:0 12px 28px #7c3aed55}.title h1{margin:0;font-size:clamp(22px,3vw,38px);line-height:1}.title p{margin:6px 0 0;color:#6b587d;font-weight:700}.pill{background:white;border:2px solid #eadcff;border-radius:999px;padding:10px 14px;font-weight:900;color:var(--roxo);box-shadow:0 8px 22px #9f7aea22}.grid{display:grid;grid-template-columns:1.15fr .85fr;gap:18px}.card{background:rgba(255,255,255,.88);backdrop-filter:blur(10px);border:1px solid #eadcff;border-radius:28px;box-shadow:0 20px 60px #6d28d91a;padding:20px}.hero{display:grid;grid-template-columns:1fr 260px;gap:18px;align-items:center}.big{font-size:clamp(26px,4vw,54px);margin:0 0 10px}.btn{border:0;border-radius:18px;padding:13px 18px;font-weight:950;cursor:pointer;background:linear-gradient(135deg,var(--roxo),var(--rosa));color:#fff;box-shadow:0 12px 24px #a855f744;font-size:15px}.btn.secondary{background:white;color:var(--roxo);border:2px solid #dcc6ff}.btn.green{background:linear-gradient(135deg,#16a34a,#22c55e)}.btn.warn{background:linear-gradient(135deg,#f59e0b,#ef4444)}.btn:disabled{opacity:.45;cursor:not-allowed}.input{width:100%;border:2px solid #e8d8ff;border-radius:16px;padding:13px 14px;font-size:16px;font-weight:800;background:white;color:var(--preto);margin:7px 0}.roomCode{font-size:44px;font-weight:1000;letter-spacing:7px;color:var(--roxo);text-shadow:0 4px #f6d4ff}.qrBox{background:white;border-radius:24px;padding:14px;text-align:center;border:2px dashed #d8b4fe}.qrBox img{width:190px;height:190px;image-rendering:auto}.teams{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.team{border-radius:20px;background:#fff;padding:14px;border:2px solid #eadcff;display:flex;align-items:center;gap:10px;font-weight:900}.dot{width:22px;height:22px;border-radius:50%;box-shadow:inset 0 0 0 4px #fff}.boardWrap{overflow:auto;padding:12px;background:linear-gradient(180deg,#fff,#fff7fb);border-radius:30px;border:2px solid #eadcff}.board{position:relative;min-width:760px;height:470px;background:linear-gradient(135deg,#fdf2f8,#f5f3ff 48%,#ecfeff);border-radius:28px;overflow:hidden}.pathLine{position:absolute;inset:0;opacity:.18;background:radial-gradient(circle at 20% 35%,#a855f7 0 16px,transparent 17px),radial-gradient(circle at 70% 25%,#ec4899 0 20px,transparent 21px),radial-gradient(circle at 50% 75%,#22c55e 0 18px,transparent 19px)}.cell{position:absolute;width:58px;height:58px;border-radius:50%;background:white;border:4px solid #ddd;display:grid;place-items:center;font-size:23px;font-weight:1000;box-shadow:0 10px 22px #6d28d926;transition:.25s}.cell.medic{border-color:#a855f7;background:#faf5ff}.cell.mix{border-color:#ec4899;background:#fff1f2}.cell.arbo{border-color:#22c55e;background:#f0fdf4}.cell.bonus{border-color:#facc15;background:#fefce8}.cell.start{border-color:#38bdf8}.cell.end{border-color:#fb7185;background:#fff7ed}.pawn{position:absolute;width:30px;height:30px;border-radius:50%;border:4px solid #fff;box-shadow:0 8px 18px #0004;z-index:5;transition:all .7s cubic-bezier(.2,.9,.3,1.2);display:grid;place-items:center;font-size:14px}.status{font-size:20px;font-weight:950}.curiosity{font-size:20px;line-height:1.35;background:linear-gradient(135deg,#faf5ff,#fff1f2);padding:18px;border-radius:20px;border:2px solid #eadcff}.rank{display:grid;gap:10px}.rankRow{display:grid;grid-template-columns:28px 1fr auto;align-items:center;gap:10px;background:#fff;padding:12px;border-radius:16px;border:1px solid #eadcff;font-weight:950}.phone{max-width:520px;margin:0 auto;padding-top:12px}.phoneCard{background:rgba(255,255,255,.95);border:1px solid #eadcff;border-radius:30px;padding:22px;box-shadow:0 20px 60px #6d28d928}.center{text-align:center}.dice{width:120px;height:120px;border-radius:28px;background:linear-gradient(135deg,#fff,#f5e8ff);display:grid;place-items:center;margin:18px auto;border:4px solid #d8b4fe;font-size:56px;font-weight:1000;box-shadow:0 20px 40px #7c3aed33}.shake{animation:shake .55s ease-in-out}@keyframes shake{0%,100%{transform:rotate(0) scale(1)}20%{transform:rotate(12deg) scale(1.05)}40%{transform:rotate(-12deg) scale(.98)}60%{transform:rotate(8deg) scale(1.07)}80%{transform:rotate(-8deg) scale(1)}}.question{border-radius:24px;padding:18px;background:linear-gradient(135deg,#6d28d9,#ec4899);color:white;margin-top:14px}.question h2{margin:0 0 10px}.question p{font-size:20px;font-weight:850;line-height:1.35}.options{display:grid;gap:9px}.option{background:rgba(255,255,255,.18);padding:12px;border-radius:15px;font-weight:850}.small{font-size:13px;color:#7b658e}.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#1e1433;color:white;padding:12px 18px;border-radius:999px;font-weight:900;box-shadow:0 15px 35px #0005;z-index:99}.confetti{pointer-events:none;position:fixed;inset:0;overflow:hidden;z-index:60}.confetti i{position:absolute;top:-20px;width:10px;height:18px;background:var(--rosa);animation:fall 2.8s linear forwards}@keyframes fall{to{transform:translateY(110vh) rotate(720deg)}}
    @media(max-width:900px){.app{padding:14px}.grid,.hero{grid-template-columns:1fr}.top{display:block}.pill{display:inline-block;margin-top:10px}.board{min-width:720px}.teams{grid-template-columns:1fr}.big{font-size:30px}}
  </style>
</head>
<body>
<div id="toast" class="toast hidden"></div>
<div id="confetti" class="confetti hidden"></div>
<div id="app" class="app"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA31U0WwsrzaeOZYHqBu2llYzHnkeB8s6k",
  authDomain: "quimica-que-cuida-e8f77.firebaseapp.com",
  projectId: "quimica-que-cuida-e8f77",
  storageBucket: "quimica-que-cuida-e8f77.firebasestorage.app",
  messagingSenderId: "737955459903",
  appId: "1:737955459903:web:589e78162e27dab02e598a"
};

const fb = initializeApp(firebaseConfig);
const db = getFirestore(fb);
const app = document.getElementById('app');
const toastEl = document.getElementById('toast');
const boardLen = 28;
const colors = ['#7c3aed','#ec4899','#22c55e','#38bdf8'];
const mascots = ['💊','🧪','🦟','🩺'];
const cellData = [
 ['start','🏁'],['medic','💊'],['mix','☣️'],['arbo','🦟'],['normal','🧠'],['bonus','⭐'],['medic','💊'],
 ['mix','☣️'],['normal','🧪'],['arbo','🦟'],['bonus','🎁'],['medic','💊'],['normal','🌿'],['mix','☣️'],
 ['arbo','🦟'],['bonus','⭐'],['medic','💊'],['normal','🩺'],['mix','☣️'],['arbo','🦟'],['bonus','🎁'],
 ['normal','🧬'],['medic','💊'],['mix','☣️'],['arbo','🦟'],['normal','🔬'],['bonus','⭐'],['end','🏆']
];
const cellPos = [
 [35,360],[110,305],[190,255],[275,220],[365,210],[455,230],[540,280],[625,335],
 [660,235],[595,170],[505,125],[410,105],[315,125],[225,175],[135,235],[70,160],
 [140,90],[235,55],[335,70],[430,105],[520,150],[610,105],[680,160],[625,250],
 [535,335],[435,385],[330,370],[225,320]
];
const curiosities = [
 'Misturar água sanitária com vinagre pode liberar gás cloro, que irrita olhos e pulmões.',
 'Medicamento não deve ser compartilhado: a dose correta depende da pessoa, idade, peso e condição de saúde.',
 'A dengue, a zika e a chikungunya são arboviroses transmitidas pelo mosquito Aedes aegypti.',
 'Água parada em tampinhas, pneus, vasos e caixas descobertas pode virar criadouro do mosquito.',
 'Antibiótico usado de forma incorreta pode favorecer resistência bacteriana.',
 'Produtos de limpeza devem ficar nas embalagens originais e longe de crianças.',
 'O uso de repelente, telas e eliminação de criadouros ajuda na prevenção das arboviroses.',
 'Não misture produtos de limpeza achando que vai “limpar mais”: pode formar substâncias perigosas.'
];
const cards = {
 medic:[
  {tipo:'Pergunta', tema:'Uso correto de medicamentos', q:'Por que não devemos tomar antibiótico sem orientação profissional?', op:['Porque pode causar resistência bacteriana e efeitos indesejados.','Porque todo antibiótico é fraco.','Porque antibiótico só serve para febre.','Porque não tem efeito no corpo.'], ans:'A'},
  {tipo:'Pergunta', tema:'Uso correto de medicamentos', q:'O que deve ser feito antes de usar um medicamento?', op:['Ler a bula e seguir a orientação do profissional de saúde.','Tomar sempre dois comprimidos.','Misturar com outro remédio para potencializar.','Usar a dose que outra pessoa usou.'], ans:'A'},
  {tipo:'Desafio', tema:'Uso correto de medicamentos', q:'Cite dois riscos da automedicação.', op:['Resposta esperada: intoxicação, alergias, interação medicamentosa, mascarar doença, dose errada.'], ans:'oral'},
  {tipo:'Pergunta', tema:'Uso correto de medicamentos', q:'Por que não é correto interromper um tratamento quando os sintomas melhoram?', op:['Porque a doença pode voltar ou o tratamento pode perder eficácia.','Porque remédio nunca deve acabar.','Porque sintomas não importam.','Porque todo tratamento dura 1 dia.'], ans:'A'}
 ],
 mix:[
  {tipo:'Pergunta', tema:'Misturas perigosas', q:'Qual mistura doméstica pode liberar gás tóxico?', op:['Água sanitária + vinagre.','Água + detergente neutro.','Sabão + água.','Álcool 70% usado sozinho.'], ans:'A'},
  {tipo:'Desafio', tema:'Misturas perigosas', q:'Explique para a turma por que “misturar produtos para limpar mais” pode ser perigoso.', op:['Resposta esperada: pode gerar gases tóxicos, irritação, queimaduras e intoxicação.'], ans:'oral'},
  {tipo:'Pergunta', tema:'Misturas perigosas', q:'Qual cuidado é importante ao usar produtos de limpeza?', op:['Usar em local ventilado e não misturar produtos.','Misturar todos em um balde.','Guardar em garrafa de refrigerante.','Cheirar para testar se está forte.'], ans:'A'},
  {tipo:'Pergunta', tema:'Misturas perigosas', q:'Por que produtos de limpeza não devem ser colocados em garrafas de bebida?', op:['Porque alguém pode confundir e ingerir.','Porque perde a cor.','Porque fica mais caro.','Porque limpa menos.'], ans:'A'}
 ],
 arbo:[
  {tipo:'Pergunta', tema:'Arboviroses', q:'Qual é uma forma eficaz de prevenir dengue, zika e chikungunya?', op:['Eliminar água parada.','Tomar antibiótico.','Deixar caixas d’água abertas.','Jogar lixo em terrenos.'], ans:'A'},
  {tipo:'Pergunta', tema:'Arboviroses', q:'Qual mosquito transmite dengue, zika e chikungunya?', op:['Aedes aegypti.','Mosca doméstica.','Barata.','Pernilongo comum apenas.'], ans:'A'},
  {tipo:'Desafio', tema:'Arboviroses', q:'Cite três locais onde o Aedes aegypti pode se reproduzir.', op:['Resposta esperada: pneus, vasos, garrafas, tampinhas, caixas d’água, calhas, lixo acumulado.'], ans:'oral'},
  {tipo:'Pergunta', tema:'Arboviroses', q:'Por que a prevenção das arboviroses é responsabilidade coletiva?', op:['Porque o mosquito pode se reproduzir em qualquer casa e afetar toda a comunidade.','Porque só a escola pode resolver.','Porque só acontece em zona rural.','Porque não depende do ambiente.'], ans:'A'}
 ],
 bonus:[
  {tipo:'Bônus', tema:'Casa bônus', q:'Avance mais 1 casa se o grupo citar uma atitude de prevenção em saúde.', op:['Resposta oral.'], ans:'oral', bonus:1},
  {tipo:'Bônus', tema:'Casa bônus', q:'Ganhe 5 pontos se explicar uma curiosidade química relacionada ao tema.', op:['Resposta oral.'], ans:'oral', points:5}
 ],
 normal:[
  {tipo:'Curiosidade', tema:'Saúde e Química', q:'A Química está presente nos medicamentos, nos produtos de limpeza e nas ações de prevenção em saúde.', op:['Continue o jogo!'], ans:'ok'}
 ]
};
function qs(){return new URLSearchParams(location.search)}
function showToast(t){toastEl.textContent=t;toastEl.classList.remove('hidden');setTimeout(()=>toastEl.classList.add('hidden'),2600)}
function roomRef(code){return doc(db,'rooms',code)}
function randCode(){return Math.floor(100000+Math.random()*900000).toString()}
function rand(arr){return arr[Math.floor(Math.random()*arr.length)]}
function currentUrlJoin(code){let u=new URL(location.href);u.search='?join=1&room='+code;return u.toString()}
function qr(code){return `https://api.qrserver.com/v1/create-qr-code/?size=260x260&data=${encodeURIComponent(currentUrlJoin(code))}`}
function emptyRoom(code){return {code,createdAt:serverTimestamp(),status:'lobby',turnIndex:0,currentTeam:null,phase:'lobby',dice:null,currentCard:null,curiosity:rand(curiosities),teams:{},order:[],winner:null}}
async function createRoom(){const code=randCode();await setDoc(roomRef(code), emptyRoom(code));localStorage.setItem('hostRoom',code);location.href=location.pathname+'?host=1&room='+code}
function header(extra=''){return `<div class="top"><div class="brand"><div class="logo">🧪</div><div class="title"><h1>Química que Cuida</h1><p>Saúde, Consciência e Prevenção</p></div></div><div class="pill">${extra||'Jogo de Trilha'}</div></div>`}
function renderHome(){app.innerHTML=header()+`<div class="card hero"><div><h2 class="big">Jogo de trilha interativo</h2><p class="status">Misturas perigosas • Uso correto de medicamentos • Arboviroses</p><p>Abra no computador/projetor para criar a sala. Os líderes entram pelo QR Code no celular.</p><button class="btn" id="newRoom">Criar sala no telão</button><button class="btn secondary" id="joinBtn">Entrar como líder</button></div><div class="qrBox"><div style="font-size:88px">🎲</div><b>Até 4 grupos</b><p class="small">Um único link, telão e celulares sincronizados pelo Firebase.</p></div></div>`;document.getElementById('newRoom').onclick=createRoom;document.getElementById('joinBtn').onclick=()=>{location.href=location.pathname+'?join=1'}}
function renderBoard(room){let cells=cellData.map((c,i)=>`<div class="cell ${c[0]}" style="left:${cellPos[i][0]}px;top:${cellPos[i][1]}px">${c[1]}</div>`).join('');let pawns=Object.entries(room.teams||{}).map(([id,t],idx)=>{let p=cellPos[t.position||0]||cellPos[0];return `<div class="pawn" style="left:${p[0]+14+idx*8}px;top:${p[1]+14+idx*6}px;background:${t.color}">${t.mascot||'●'}</div>`}).join('');return `<div class="boardWrap"><div class="board"><div class="pathLine"></div>${cells}${pawns}</div></div>`}
function teamsHtml(room){let entries=Object.entries(room.teams||{});if(!entries.length)return '<p class="small">Nenhum grupo entrou ainda.</p>';return `<div class="teams">${entries.map(([id,t])=>`<div class="team"><span class="dot" style="background:${t.color}"></span>${t.mascot} ${t.name}<span style="margin-left:auto">${t.score||0} pts</span></div>`).join('')}</div>`}
function ranking(room){let entries=Object.entries(room.teams||{}).sort((a,b)=>(b[1].score||0)-(a[1].score||0));return `<div class="rank">${entries.map(([id,t],i)=>`<div class="rankRow"><b>${i+1}</b><span>${t.mascot} ${t.name}</span><b>${t.score||0}</b></div>`).join('')||'<p class="small">Ranking aparecerá aqui.</p>'}</div>`}
function hostScreen(code){app.innerHTML=header('Sala '+code)+`<div id="hostContent"></div>`;onSnapshot(roomRef(code),snap=>{if(!snap.exists()){showToast('Sala não encontrada');return}let r=snap.data();let current=r.currentTeam?r.teams[r.currentTeam]:null;let html=`<div class="grid"><div>${renderBoard(r)}</div><div class="card"><div class="roomCode">${code}</div><div class="qrBox"><img src="${qr(code)}"><p><b>Líderes escaneiam para entrar</b></p></div><h3>Grupos conectados</h3>${teamsHtml(r)}<hr style="border:0;border-top:1px solid #eadcff;margin:16px 0"><div class="status">${r.status==='lobby'?'Aguardando grupos...': r.winner?'🏆 Campeão: '+r.teams[r.winner]?.name : current?'Vez de '+current.name:'Partida em andamento'}</div><p class="curiosity">${r.phase==='answer'?'Pergunta/desafio privado no celular do líder da vez.':(r.curiosity||rand(curiosities))}</p><div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:12px">${r.status==='lobby'?'<button class="btn green" id="startGame">Iniciar jogo</button>':''}${r.phase==='answer'?'<button class="btn green" id="correct">Acertou +10</button><button class="btn warn" id="wrong">Errou / passar</button>':''}<button class="btn secondary" id="reset">Nova sala</button></div><h3>Ranking</h3>${ranking(r)}</div></div>`;document.getElementById('hostContent').innerHTML=html;let start=document.getElementById('startGame');if(start)start.onclick=()=>startGame(code,r);let correct=document.getElementById('correct');if(correct)correct.onclick=()=>finishTurn(code,r,true);let wrong=document.getElementById('wrong');if(wrong)wrong.onclick=()=>finishTurn(code,r,false);document.getElementById('reset').onclick=createRoom;if(r.winner)confetti();});}
async function startGame(code,r){let order=Object.keys(r.teams||{}).slice(0,4);if(!order.length){showToast('Nenhum grupo entrou ainda');return}await updateDoc(roomRef(code),{status:'playing',order,currentTeam:order[0],turnIndex:0,phase:'roll',curiosity:rand(curiosities),winner:null});}
async function finishTurn(code,r,ok){let teams={...(r.teams||{})};let id=r.currentTeam;if(ok&&id)teams[id].score=(teams[id].score||0)+((r.currentCard&&r.currentCard.points)||10);if(r.currentCard&&r.currentCard.bonus&&id)teams[id].position=Math.min(boardLen-1,(teams[id].position||0)+r.currentCard.bonus);if(id&&teams[id].position>=boardLen-1){await updateDoc(roomRef(code),{teams,winner:id,status:'ended',phase:'ended'});return}let order=r.order||Object.keys(teams);let nextIndex=((r.turnIndex||0)+1)%order.length;await updateDoc(roomRef(code),{teams,turnIndex:nextIndex,currentTeam:order[nextIndex],phase:'roll',dice:null,currentCard:null,curiosity:rand(curiosities)});}
function joinScreen(codeParam){app.innerHTML=header('Modo líder')+`<div class="phone"><div class="phoneCard"><h2>Entrar no jogo</h2><input class="input" id="roomInput" placeholder="Código da sala" value="${codeParam||''}"><input class="input" id="teamName" placeholder="Nome do grupo"><button class="btn" id="joinNow">Entrar como líder</button><p class="small">Cada grupo deve entrar em apenas um celular.</p></div></div>`;document.getElementById('joinNow').onclick=async()=>{let code=document.getElementById('roomInput').value.trim();let name=document.getElementById('teamName').value.trim();if(!code||!name)return showToast('Preencha o código e o nome do grupo');let snap=await getDoc(roomRef(code));if(!snap.exists())return showToast('Sala não encontrada');let r=snap.data();let n=Object.keys(r.teams||{}).length;if(n>=4)return showToast('Limite de 4 grupos atingido');let id='g'+Date.now();let teams={...(r.teams||{})};teams[id]={name,color:colors[n],mascot:mascots[n],score:0,position:0,joinedAt:Date.now()};await updateDoc(roomRef(code),{teams});localStorage.setItem('teamId_'+code,id);location.href=location.pathname+`?join=1&room=${code}&team=${id}`;}}
function leaderScreen(code,teamId){app.innerHTML=header('Líder')+`<div class="phone"><div id="leaderContent" class="phoneCard center">Conectando...</div></div>`;onSnapshot(roomRef(code),snap=>{if(!snap.exists()){document.getElementById('leaderContent').innerHTML='Sala não encontrada';return}let r=snap.data();let t=(r.teams||{})[teamId];if(!t){document.getElementById('leaderContent').innerHTML='<h2>Grupo não encontrado</h2><button class="btn" onclick="location.href=location.pathname+\'?join=1&room='+code+'\'">Entrar novamente</button>';return}let isTurn=r.currentTeam===teamId;let html='';if(r.status==='lobby')html=`<h2>${t.mascot} ${t.name}</h2><p class="status">Você entrou na sala ${code}</p><p class="curiosity">Aguardando o professor iniciar o jogo...</p>`;else if(r.status==='ended')html=`<h2>${r.winner===teamId?'🏆 Seu grupo venceu!':'Fim de jogo!'}</h2><p>Campeão: ${r.teams[r.winner]?.name||''}</p>`;else if(!isTurn)html=`<h2>${t.mascot} ${t.name}</h2><p class="status">Aguardando sua vez...</p><p class="curiosity">${r.curiosity||rand(curiosities)}</p><p><b>Sua posição:</b> ${t.position||0} / ${boardLen-1}</p><p><b>Pontos:</b> ${t.score||0}</p>`;else if(r.phase==='roll')html=`<h2>🎲 Sua vez, ${t.name}!</h2><p>Toque no dado para descobrir quantas casas avançar.</p><div class="dice" id="dice">?</div><button class="btn" id="roll">Rolar dado</button>`;else if(r.phase==='answer'){let c=r.currentCard;html=`<h2>${t.mascot} ${t.name}</h2><div class="dice">${r.dice||'🎲'}</div><div class="question"><h2>${c.tipo} • ${c.tema}</h2><p>${c.q}</p><div class="options">${(c.op||[]).map((o,i)=>`<div class="option">${String.fromCharCode(65+i)}) ${o}</div>`).join('')}</div></div><p class="small">Somente o líder da rodada deve ver esta pergunta/desafio. Leia para o grupo responder.</p>`}document.getElementById('leaderContent').innerHTML=html;let roll=document.getElementById('roll');if(roll)roll.onclick=()=>rollDice(code,r,teamId);});}
async function rollDice(code,r,teamId){let diceEl=document.getElementById('dice');diceEl.classList.add('shake');let dice=1+Math.floor(Math.random()*6);setTimeout(async()=>{let teams={...(r.teams||{})};let t=teams[teamId];let newPos=Math.min(boardLen-1,(t.position||0)+dice);t.position=newPos;let type=cellData[newPos][0];let pool=cards[type]||cards.normal;let card=rand(pool);await updateDoc(roomRef(code),{teams,dice,currentCard:card,phase:'answer',curiosity:rand(curiosities)});},600)}
function confetti(){let c=document.getElementById('confetti');c.innerHTML='';c.classList.remove('hidden');for(let i=0;i<80;i++){let e=document.createElement('i');e.style.left=Math.random()*100+'%';e.style.background=[colors[0],colors[1],colors[2],colors[3],'#facc15'][i%5];e.style.animationDelay=Math.random()*0.8+'s';c.appendChild(e)}setTimeout(()=>c.classList.add('hidden'),3500)}
const params=qs();const code=params.get('room')||localStorage.getItem('hostRoom');if(params.get('join')){let team=params.get('team');if(team&&params.get('room'))leaderScreen(params.get('room'),team);else joinScreen(params.get('room'))}else if(params.get('host')&&params.get('room'))hostScreen(params.get('room'));else renderHome();
</script>
