<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Química que Cuida — Jogo de Trilha</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
:root{--roxo:#5b21b6;--rosa:#ec4899;--lilas:#a78bfa;--claro:#fff7fd;--escuro:#24133f;--verde:#16a34a;--azul:#0284c7;--amarelo:#f59e0b;--vermelho:#dc2626;--sombra:0 20px 55px rgba(84,33,130,.22)}
*{box-sizing:border-box}body{margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;color:var(--escuro);background:radial-gradient(circle at 12% 8%,#ffe0f3 0 18%,transparent 36%),radial-gradient(circle at 88% 25%,#ddd6fe 0 22%,transparent 40%),linear-gradient(135deg,#fff,#faf5ff 48%,#fdf2f8);min-height:100vh;overflow-x:hidden}.wrap{max-width:1240px;margin:auto;padding:20px}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:16px}.brand{display:flex;gap:12px;align-items:center}.logo{width:62px;height:62px;border-radius:22px;background:linear-gradient(135deg,var(--roxo),var(--rosa));display:grid;place-items:center;color:white;font-size:31px;box-shadow:var(--sombra)}h1,h2,h3,p{margin-top:0}h1{font-size:clamp(1.35rem,3vw,2.25rem);margin-bottom:3px}.muted{color:#746486}.pill{font-weight:900;color:var(--roxo);background:white;border:1px solid #ecd7ff;border-radius:999px;padding:10px 14px;box-shadow:0 9px 28px rgba(91,33,182,.12)}.card{background:rgba(255,255,255,.88);border:1px solid rgba(167,139,250,.28);border-radius:30px;padding:20px;box-shadow:var(--sombra);backdrop-filter:blur(10px)}.hero{min-height:86vh;display:grid;place-items:center;text-align:center}.hero .card{max-width:900px}.title{font-size:clamp(2.5rem,6vw,5rem);line-height:.94;letter-spacing:-.07em;background:linear-gradient(90deg,var(--roxo),var(--rosa));-webkit-background-clip:text;color:transparent;margin:8px 0 14px}.btn{cursor:pointer;border:0;border-radius:18px;padding:14px 18px;background:linear-gradient(135deg,var(--roxo),var(--rosa));color:white;font-weight:950;font-size:1rem;box-shadow:0 14px 32px rgba(91,33,182,.27);transition:.2s}.btn:hover{transform:translateY(-2px)}.btn.secondary{background:white;color:var(--roxo);border:2px solid #eadcff}.btn.ghost{background:#f7edff;color:var(--roxo);box-shadow:none}.btn.red{background:linear-gradient(135deg,#b91c1c,#fb7185)}.btn:disabled{opacity:.48;cursor:not-allowed;transform:none}.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.center{justify-content:center}.grid{display:grid;grid-template-columns:1.25fr .75fr;gap:18px}.input{width:100%;border:2px solid #eadcff;border-radius:16px;padding:13px 14px;background:#fff;font-weight:800}.qrbox{display:inline-block;background:white;border-radius:26px;padding:14px;box-shadow:0 18px 40px rgba(0,0,0,.14)}.code{font-size:clamp(2.5rem,7vw,5rem);font-weight:1000;color:var(--roxo);letter-spacing:.06em;text-shadow:0 8px 0 #fce7f3}.teams{display:grid;gap:10px}.team{display:flex;justify-content:space-between;align-items:center;padding:12px;border-radius:18px;background:linear-gradient(135deg,#fff,#faf5ff);border:1px solid #eadcff}.warn{background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;padding:12px;border-radius:16px;margin:12px 0;font-weight:800}.boardHead{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:14px}.turn{background:linear-gradient(135deg,#fdf2f8,#ede9fe);border-radius:999px;padding:10px 14px;color:var(--roxo);font-weight:1000}.trail{position:relative;min-height:625px;border-radius:32px;overflow:hidden;background:linear-gradient(135deg,rgba(255,255,255,.94),rgba(250,245,255,.78));border:2px solid rgba(236,72,153,.16)}.trail:before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 25% 20%,rgba(236,72,153,.13),transparent 20%),radial-gradient(circle at 78% 80%,rgba(91,33,182,.12),transparent 25%)}svg.path{position:absolute;inset:0;width:100%;height:100%;z-index:1}.node{position:absolute;width:66px;height:66px;border-radius:23px;display:grid;place-items:center;text-align:center;transform:translate(-50%,-50%);z-index:3;color:white;font-weight:1000;border:4px solid rgba(255,255,255,.9);box-shadow:0 13px 25px rgba(31,18,61,.22)}.node small{display:block;font-size:.62rem;line-height:1}.mistura{background:linear-gradient(135deg,#6d28d9,#ec4899)}.med{background:linear-gradient(135deg,#0284c7,#22c55e)}.arbo{background:linear-gradient(135deg,#f59e0b,#ef4444)}.desafio{background:linear-gradient(135deg,#111827,#7c3aed);animation:pulse 1.6s infinite}.bonus{background:linear-gradient(135deg,#fbbf24,#ec4899)}@keyframes pulse{50%{transform:translate(-50%,-50%) scale(1.07)}}.peao{position:absolute;width:36px;height:36px;border-radius:50%;z-index:7;border:4px solid white;box-shadow:0 9px 18px rgba(0,0,0,.25);display:grid;place-items:center;color:white;font-weight:1000;transition:1s cubic-bezier(.2,.9,.2,1)}.side{display:grid;gap:18px}.score{display:grid;gap:8px}.scoreRow{display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center;background:#fff;border:1px solid #eee;border-radius:16px;padding:10px}.dot{width:18px;height:18px;border-radius:50%}.curiosity{font-size:1.08rem;line-height:1.42;padding:18px;border-radius:22px;background:linear-gradient(135deg,#fdf2f8,#ede9fe);border:1px dashed var(--rosa)}.phone{max-width:540px;margin:0 auto;padding:16px}.dice{font-size:5rem;width:142px;height:142px;border:0;border-radius:34px;background:#fff;color:var(--roxo);box-shadow:var(--sombra);cursor:pointer;animation:float 2.1s infinite}.dice.rolling{animation:shake .45s infinite}.question{padding:18px;border-radius:24px;background:linear-gradient(135deg,#fff,#fdf2f8);border:2px solid #fbcfe8}.tag{display:inline-block;background:#ede9fe;color:var(--roxo);padding:6px 10px;border-radius:999px;font-weight:1000;margin-bottom:8px}.answers{display:grid;gap:10px;margin-top:12px}.answer{border:2px solid #eadcff;border-radius:16px;background:#fff;padding:12px;font-weight:850;text-align:left}.answer.sel{border-color:var(--roxo);background:#f5f3ff}.hidden{display:none!important}@keyframes float{50%{transform:translateY(-8px) rotate(2deg)}}@keyframes shake{25%{transform:rotate(-8deg) scale(1.04)}75%{transform:rotate(8deg) scale(1.04)}}.confetti{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:50}.confetti span{position:absolute;width:10px;height:18px;top:-30px;animation:fall 2.7s linear forwards}@keyframes fall{to{transform:translateY(108vh) rotate(760deg)}}@media(max-width:900px){.grid{grid-template-columns:1fr}.trail{min-height:540px}.node{width:52px;height:52px;border-radius:18px;font-size:.82rem}.pill{display:none}.top{align-items:flex-start}.brand{align-items:flex-start}}
</style>
</head>
<body><div id="app"></div><div class="confetti" id="confetti"></div>
<script>
const $=s=>document.querySelector(s), app=$('#app');
const themes={mistura:'Misturas perigosas',med:'Uso correto de medicamentos',arbo:'Arboviroses',desafio:'Desafio',bonus:'Bônus'};
const colors=['#7c3aed','#ec4899','#0284c7','#16a34a','#f59e0b','#dc2626','#14b8a6','#111827'];
const path=[[7,83],[15,73],[25,80],[36,69],[49,76],[60,64],[74,72],[88,62],[78,50],[63,55],[51,45],[37,52],[22,43],[11,31],[25,22],[41,29],[55,20],[69,28],[84,17],[93,9]];
const nodeTypes=['bonus','mistura','med','arbo','desafio','mistura','med','bonus','arbo','desafio','mistura','med','arbo','bonus','desafio','mistura','med','arbo','desafio','bonus'];
const curios=[
'Nunca misture água sanitária com vinagre, álcool ou produtos com amônia: pode liberar gases irritantes e perigosos.',
'Medicamento não deve ser compartilhado. O que serve para uma pessoa pode fazer mal para outra.',
'O mosquito Aedes aegypti se reproduz em água parada, até em pequenos recipientes esquecidos no quintal.',
'Antibiótico usado de forma errada contribui para resistência bacteriana e pode dificultar tratamentos futuros.',
'Produtos de limpeza devem ficar em embalagens originais, longe de crianças e bem identificados.',
'Dengue, zika e chikungunya são arboviroses transmitidas principalmente pelo Aedes aegypti.',
'Misturar produtos achando que vai limpar melhor pode aumentar o risco de intoxicação.',
'O descarte correto de medicamentos evita contaminação do solo, da água e acidentes domésticos.'
];
const deck=[
{t:'mistura',q:'Qual mistura doméstica é perigosa por poder liberar gases tóxicos?',a:['Água sanitária com vinagre','Água com sabão neutro','Detergente com água','Álcool em gel sozinho'],c:0},
{t:'mistura',q:'Por que não se deve colocar produto de limpeza em garrafa de refrigerante?',a:['Porque pode causar ingestão acidental','Porque estraga a garrafa','Porque perde o cheiro','Porque fica mais caro'],c:0},
{t:'mistura',q:'O que fazer ao sentir cheiro forte após misturar produtos?',a:['Abrir o ambiente e se afastar','Cheirar mais de perto','Adicionar perfume','Tampar tudo e continuar usando'],c:0},
{t:'med',q:'Por que não devemos tomar antibiótico sem orientação?',a:['Pode causar resistência e tratamento inadequado','Porque antibiótico é sempre fraco','Porque nunca funciona','Porque só serve para dor de cabeça'],c:0},
{t:'med',q:'Qual atitude é correta com medicamento vencido?',a:['Descartar em ponto adequado, como farmácia ou unidade orientada','Jogar no vaso sanitário','Dar para outra pessoa','Guardar para emergência'],c:0},
{t:'med',q:'O que significa automedicação?',a:['Usar remédio por conta própria, sem orientação adequada','Tomar remédio com água','Ler a bula','Comprar remédio com receita'],c:0},
{t:'arbo',q:'Qual mosquito transmite dengue, zika e chikungunya?',a:['Aedes aegypti','Pernilongo comum','Mosca doméstica','Barata'],c:0},
{t:'arbo',q:'Qual ação ajuda a prevenir arboviroses?',a:['Eliminar água parada','Deixar garrafas abertas','Acumular lixo','Guardar pneus com água'],c:0},
{t:'arbo',q:'Qual sintoma pode aparecer em arboviroses?',a:['Febre e dores no corpo','Crescimento do cabelo','Visão melhorada','Sono permanente sem febre'],c:0},
{t:'desafio',q:'Desafio: cite duas misturas perigosas que devem ser evitadas.'},
{t:'desafio',q:'Desafio: explique para a turma por que não se deve compartilhar medicamentos.'},
{t:'desafio',q:'Desafio: fale três locais da casa onde pode acumular água parada.'},
{t:'bonus',q:'Casa bônus! Se o grupo citar uma atitude segura envolvendo produtos de limpeza, ganha +5 pontos extras.',bonus:1},
{t:'bonus',q:'Casa bônus! Se o grupo citar uma forma correta de prevenir dengue, ganha +5 pontos extras.',bonus:1}
];
let host=false, peer=null, roomId='', conns={}, myConn=null, myTeam='', localRole='', selected=null;
let state={started:false,teams:{},turn:0,rolled:null,currentCard:null,curiosity:curios[0],winner:null};
function id(){return Math.random().toString(36).slice(2,8).toUpperCase()} function pick(a){return a[Math.floor(Math.random()*a.length)]}
function joinUrl(){let u=new URL(location.href);u.searchParams.set('sala',roomId);return u.href} function send(conn,msg){try{conn&&conn.open&&conn.send(msg)}catch(e){}}
function broadcast(){Object.values(conns).forEach(c=>send(c,{type:'state',state}));render()}
function setState(p){state={...state,...p};broadcast()}
function shell(content){return `<div class="wrap"><header class="top"><div class="brand"><div class="logo">🧪</div><div><h1>Química que Cuida</h1><p class="muted">Saúde, Consciência e Prevenção</p></div></div><div class="pill">${roomId?'Sala '+roomId:'Jogo de trilha'}</div></header>${content}</div>`}
function landing(){return `<main class="hero wrap"><section class="card"><div class="logo" style="margin:auto">🧪</div><h1 class="title">Trilha Química que Cuida</h1><p class="muted">Misturas perigosas • Uso correto de medicamentos • Arboviroses</p><div class="warn">Abra esta página no computador/projetor para criar a sala. Os líderes entram pelo QR Code no celular.</div><div class="row center"><button class="btn" id="create">Criar sala no telão</button><button class="btn secondary" id="joinManual">Entrar como líder</button></div></section></main>`}
function setup(){return shell(`<section class="card"><h2>Entrada dos líderes</h2><p class="muted">Mostre esta tela no projetor. Os líderes escaneiam o QR Code e entram com o nome do grupo.</p><div class="grid"><div><div class="code">${roomId||'...'}</div><div id="qr" class="qrbox"></div><p class="muted" style="word-break:break-all;margin-top:10px">Link: ${roomId?joinUrl():'gerando...'}</p></div><div><h3>Grupos conectados</h3><div class="teams">${Object.values(state.teams).map(t=>`<div class="team"><b style="color:${t.color}">● ${t.name}</b><span>${t.members} pessoas</span></div>`).join('')||'<p class="muted">Aguardando grupos...</p>'}</div><br><button class="btn" id="start" ${Object.keys(state.teams).length<2?'disabled':''}>Começar jogo</button><button class="btn ghost" id="reset">Limpar grupos</button></div></div></section>`)}
function board(){let teams=Object.values(state.teams), cur=teams[state.turn%Math.max(teams.length,1)];return shell(`<div class="grid"><section class="card"><div class="boardHead"><div><h2>Trilha principal</h2><p class="muted">O dado e a pergunta aparecem no celular do líder da rodada.</p></div><div class="turn">Vez: ${cur?cur.name:'aguardando'}</div></div><div class="trail"><svg class="path" viewBox="0 0 100 100" preserveAspectRatio="none"><path d="${path.map((p,i)=>(i?'L':'M')+p[0]+' '+p[1]).join(' ')}" stroke="rgba(91,33,182,.25)" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/><path d="${path.map((p,i)=>(i?'L':'M')+p[0]+' '+p[1]).join(' ')}" stroke="rgba(236,72,153,.38)" stroke-width="2" fill="none" stroke-dasharray="4 4"/></svg>${path.map((p,i)=>`<div class="node ${nodeTypes[i]}" style="left:${p[0]}%;top:${p[1]}%"><div>${i+1}<small>${i==0?'INÍCIO':i==path.length-1?'FIM':themes[nodeTypes[i]].split(' ')[0]}</small></div></div>`).join('')}${teams.map((t,i)=>{let p=path[Math.min(t.pos||0,path.length-1)];return `<div class="peao" style="left:calc(${p[0]}% + ${i*9-10}px);top:calc(${p[1]}% + ${i*7-8}px);background:${t.color}">${i+1}</div>`}).join('')}</div></section><aside class="side"><section class="card"><h3>Placar</h3><div class="score">${teams.map(t=>`<div class="scoreRow"><span class="dot" style="background:${t.color}"></span><b>${t.name}</b><span>${t.score||0} pts • casa ${(t.pos||0)+1}</span></div>`).join('')}</div></section><section class="card"><h3>Curiosidade</h3><div class="curiosity">${state.curiosity}</div></section><section class="card"><h3>Controle do professor</h3><div class="row"><button class="btn" id="correct">Acertou +10</button><button class="btn red" id="wrong">Errou / passar vez</button><button class="btn ghost" id="cur">Nova curiosidade</button></div></section></aside></div>`)}
function joinScreen(){return `<main class="phone"><section class="card"><h2>Entrar como líder</h2><p class="muted">Sala ${roomId}</p><input id="teamName" class="input" placeholder="Nome do grupo"><br><br><select id="members" class="input"><option>3</option><option>4</option></select><br><br><button class="btn" id="enter">Entrar no jogo</button><p class="muted" id="status">Conectando...</p></section></main>`}
function phone(){let teams=Object.values(state.teams), me=state.teams[myTeam], cur=teams[state.turn%Math.max(teams.length,1)], myTurn=me&&cur&&me.id===cur.id;return `<main class="phone"><section class="card"><h2>${me?me.name:'Líder'}</h2><p class="muted">${myTurn?'É a vez do seu grupo!':'Aguardando sua vez...'}</p>${myTurn?`<div style="text-align:center"><button class="dice" id="roll">${state.rolled?'🎲 '+state.rolled:'🎲'}</button><p class="muted">Toque para rodar o dado.</p></div>${state.currentCard?question(state.currentCard):''}`:`<div class="curiosity">${state.curiosity}</div><br><h3>Placar</h3>${teams.map(t=>`<div class="team"><b style="color:${t.color}">${t.name}</b><span>${t.score||0} pts</span></div>`).join('')}`}</section></main>`}
function question(c){return `<div class="question"><span class="tag">${themes[c.t]}</span><h3>${c.q}</h3>${c.a?`<div class="answers">${c.a.map((x,i)=>`<button class="answer ${selected===i?'sel':''}" data-i="${i}">${x}</button>`).join('')}</div>`:'<p class="muted">O professor avalia oralmente o desafio.</p>'}</div>`}
function render(){if(host){app.innerHTML=state.started?board():setup();bindHost();setTimeout(()=>{let q=$('#qr');if(q&&roomId){q.innerHTML='';new QRCode(q,{text:joinUrl(),width:215,height:215})}},50);return} if(localRole==='leader'){app.innerHTML=myTeam?phone():joinScreen();bindLeader();return} app.innerHTML=landing();bindLanding()}
function bindLanding(){document.getElementById('create')?.addEventListener('click',createRoom);document.getElementById('joinManual')?.addEventListener('click',()=>{let r=prompt('Digite o código da sala que aparece no telão:');if(r){roomId=r.trim();localRole='leader';connectLeader();render()}})}
function createRoom(){host=true;roomId='QQC'+id();peer=new Peer(roomId);peer.on('open',()=>render());peer.on('connection',conn=>{conns[conn.peer]=conn;conn.on('data',msg=>handleClient(conn,msg));conn.on('open',()=>send(conn,{type:'state',state}));conn.on('close',()=>delete conns[conn.peer]);});render()}
function connectLeader(){myConn=new Peer().connect(roomId);myConn.on('open',()=>{send(myConn,{type:'hello'});render()});myConn.on('data',msg=>{if(msg.type==='state'){state=msg.state;render()} if(msg.type==='joined'){myTeam=msg.teamId;state=msg.state;render()}});myConn.on('error',()=>{let s=$('#status');if(s)s.textContent='Não conectou. Confira se a sala está aberta no telão.'})}
function handleClient(conn,msg){if(msg.type==='hello')send(conn,{type:'state',state});if(msg.type==='join'){let tid=id();let team={id:tid,name:msg.name||'Grupo',members:msg.members||3,pos:0,score:0,color:colors[Object.keys(state.teams).length%colors.length]};state.teams[tid]=team;send(conn,{type:'joined',teamId:tid,state});broadcast()}if(msg.type==='roll')rollFor(msg.teamId)}
function bindHost(){$('#start')?.addEventListener('click',()=>setState({started:true,turn:0,rolled:null,currentCard:null,curiosity:pick(curios)}));$('#reset')?.addEventListener('click',()=>setState({teams:{},started:false,turn:0,rolled:null,currentCard:null}));$('#cur')?.addEventListener('click',()=>setState({curiosity:pick(curios)}));$('#correct')?.addEventListener('click',()=>scoreNext(true));$('#wrong')?.addEventListener('click',()=>scoreNext(false))}
function bindLeader(){$('#enter')?.addEventListener('click',()=>{send(myConn,{type:'join',name:$('#teamName').value.trim()||'Grupo',members:$('#members').value})});$('#roll')?.addEventListener('click',()=>{selected=null;send(myConn,{type:'roll',teamId:myTeam});let b=$('#roll'); if(b)b.classList.add('rolling')});document.querySelectorAll('.answer').forEach(b=>b.addEventListener('click',()=>{selected=+b.dataset.i;render()}))}
function rollFor(teamId){if(state.rolled)return;let ids=Object.keys(state.teams), tid=ids[state.turn%ids.length];if(tid!==teamId)return;let n=Math.ceil(Math.random()*6), t=state.teams[tid], pos=Math.min((t.pos||0)+n,path.length-1), type=nodeTypes[pos];let cards=deck.filter(c=>c.t===type || (type==='bonus'&&c.t==='bonus'));state.teams[tid]={...t,pos};setState({teams:state.teams,rolled:n,currentCard:pick(cards.length?cards:deck),curiosity:pick(curios),winner:pos===path.length-1?tid:null});if(pos===path.length-1)confetti()}
function scoreNext(ok){let ids=Object.keys(state.teams);if(!ids.length)return;let tid=ids[state.turn%ids.length],t=state.teams[tid];let bonus=(ok&&state.currentCard&&state.currentCard.bonus)?5:0;state.teams[tid]={...t,score:(t.score||0)+(ok?10:0)+bonus,pos:Math.min((t.pos||0)+(ok&&state.currentCard&&state.currentCard.bonus?1:0),path.length-1)};setState({teams:state.teams,turn:(state.turn||0)+1,rolled:null,currentCard:null,curiosity:pick(curios)})}
function confetti(){let c=$('#confetti');for(let i=0;i<90;i++){let s=document.createElement('span');s.style.left=Math.random()*100+'%';s.style.background=colors[i%colors.length];s.style.animationDelay=Math.random()*1+'s';c.appendChild(s);setTimeout(()=>s.remove(),3200)}}
(function init(){let params=new URLSearchParams(location.search);let sala=params.get('sala');if(sala){roomId=sala;localRole='leader';connectLeader()}render()})();
</script>
</body></html>
